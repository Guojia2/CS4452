dataset_name: thumos
train_split: ['validation']
val_split: ['test']

dataset:
  json_file: /vol/annotations/thumos14_af.json
  feat_folder: /vol/features/videomae2-new
  file_prefix: ~
  file_ext: .npy
  num_classes: 20
  input_dim: 768
  feat_stride: 8
  num_frames: 16
  trunc_thresh: 0.5
  crop_ratio: [0.9, 1.0]
  max_seq_len: 2304

model:
  backbone_type: conv
  fpn_type: identity
  backbone_arch: [1, 1, 3]
  scale_factor: 2
  regression_range: [[0, 4], [4, 8], [8, 16], [16, 10000]]
  embd_kernel_size: 3
  embd_dim: 512
  embd_with_ln: true
  fpn_dim: 512
  fpn_with_ln: true
  fpn_start_level: 0
  head_dim: 512
  head_kernel_size: 3
  head_num_layers: 2
  head_with_ln: true
  max_buffer_len_factor: 6.0
  use_abs_pe: false
  use_rel_pe: false

opt:
  learning_rate: 0.0001
  epochs: 30
  weight_decay: 0.05

loader:
  batch_size: 2

train_cfg:
  init_loss_norm: 100
  clip_grad_l2norm: 1.0
  cls_prior_prob: 0.01
  center_sample: radius
  center_sample_radius: 1.5
  dropout: 0.0
  droppath: 0.0

test_cfg:
  voting_thresh: 0.7
  pre_nms_topk: 2000
  max_seg_num: 200
  min_score: 0.001
  multiclass_nms: True

output_folder: /vol/ckpt/Baseline-Videomae2