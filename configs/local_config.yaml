model:
  model: "cnn"
  backbone: "x3d_m"
  num_classes: 20
  pooling: "mean"
  pretrained: true
  dropout: 0.5
  num_heads: 8
  num_layers: 4
  ff_dim: 1024

data:
  clip_len_sec: 2.0
  stride_sec: 1.0
  num_frames: 16
  num_workers: 4
  batch_size: 16
  img_size: 224
  window_size: 128
  stride: 16
  subset: "training"

training:
  epochs: 200
  lr: 0.0001
  seed: 42
  val_ratio: 0.1
  weight_decay: 0.0001
  lr_scheduler: "cosine"
  warmup_epochs: 5
  grad_clip_norm: 1.0
  label_smoothing: 0.1
  batch_size: 32

extraction:
  num_workers: 2    # 2 parallel processes on same GPU
  batch_size: 64    # reduce to 32 if you hit OOM

augmentation:
  window_jitter: false
  class_balanced_sampling: false
  gaussian_noise:
    enabled: false
    std: 0.01
  time_mask:
    enabled: false
    max_len: 10
  feature_mask:
    enabled: false
    max_len: 256
  feature_dropout:
    enabled: false
    p: 0.1
  mixup:
    enabled: false
    alpha: 0.2
    prob: 0.5
  cutpaste:
    enabled: false
    prob: 0.3
  speed_perturb:
    enabled: false
    range: [0.8, 1.2]

paths:
  data_root: "c:/Users/Admin/OneDrive/Documents/GitHub/CS4452/data/THUMOS14"
  # local annotation zip extracted into a nested subfolder — override the path directly
  ann_path: "c:/Users/Admin/OneDrive/Documents/GitHub/CS4452/data/THUMOS14/annotations/annotations/thumos_14_anno.json"
  feature_dir: "c:/Users/Admin/OneDrive/Documents/GitHub/CS4452/data/THUMOS14/features/clip_level"
  checkpoint_dir: "c:/Users/Admin/OneDrive/Documents/GitHub/CS4452/data/checkpoints"
  log_dir: "c:/Users/Admin/OneDrive/Documents/GitHub/CS4452/data/logs"
